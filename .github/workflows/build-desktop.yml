name: Build Desktop (unsigned)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: build-desktop-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS arm64 DMG
            runner: macos-14
            platform: mac
            target: dmg
            arch: arm64
          - label: Linux x64 AppImage
            runner: ubuntu-24.04
            platform: linux
            target: AppImage
            arch: x64
          - label: Windows x64 EXE
            runner: windows-2022
            platform: win
            target: nsis
            arch: x64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - name: Install dependencies
        if: ${{ matrix.platform != 'win' }}
        run: bun install --frozen-lockfile

      - name: Install dependencies
        if: ${{ matrix.platform == 'win' }}
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Build desktop artifact (unsigned)
        shell: bash
        run: |
          bun run dist:desktop:artifact -- \
            --platform "${{ matrix.platform }}" \
            --target "${{ matrix.target }}" \
            --arch "${{ matrix.arch }}" \
            --verbose

      - name: Collect build outputs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build-output

          shopt -s nullglob
          for pattern in \
            "release/*.dmg" \
            "release/*.zip" \
            "release/*.AppImage" \
            "release/*.exe" \
            "release/*.blockmap" \
            "release/latest*.yml"; do
            for file in $pattern; do
              cp "$file" build-output/
            done
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: desktop-${{ matrix.platform }}-${{ matrix.arch }}
          path: build-output/*
          if-no-files-found: error
          retention-days: 14
